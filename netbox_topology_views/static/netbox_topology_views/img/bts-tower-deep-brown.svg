<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- BTS Tower icon for NetBox Topology Views -->
<svg
   width="35.465633mm"
   height="35.465633mm"
   viewBox="0 0 35.465633 35.465634"
   version="1.1"
   id="svg-bts-tower"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   style="fill:#5b3a29;stroke:#2b1b12;">

  <defs id="defs1" />

  <g
     inkscape:label="Icons"
     inkscape:groupmode="layer"
     id="layer1">

    <!-- Background circle (same as original icon style) -->
    <circle
       style="fill:#d2b48c;fill-opacity:1;stroke:#9cc8f8;stroke-width:1.323;stroke-miterlimit:4;stroke-dasharray:none;stroke-opacity:1"
       id="bg-circle"
       cx="17.732817"
       cy="17.732817"
       r="17.071318" />

    <!-- BTS Tower group, centered in the circle -->
    <g id="bts-tower" transform="translate(17.732817, 17.732817)">

      <!-- Tower main mast (vertical pole) -->
      <line x1="0" y1="-12" x2="0" y2="10"
            style="stroke:#1685fc;stroke-width:1.5;stroke-linecap:round;" />

      <!-- Tower base legs (A-frame) -->
      <line x1="0" y1="10" x2="-7" y2="14"
            style="stroke:#1685fc;stroke-width:1.3;stroke-linecap:round;" />
      <line x1="0" y1="10" x2="7" y2="14"
            style="stroke:#1685fc;stroke-width:1.3;stroke-linecap:round;" />

      <!-- Cross braces -->
      <line x1="-3.5" y1="12" x2="3.5" y2="12"
            style="stroke:#1685fc;stroke-width:1.0;stroke-linecap:round;" />
      <line x1="-5.5" y1="13" x2="5.5" y2="13"
            style="stroke:#1685fc;stroke-width:1.0;stroke-linecap:round;" />

      <!-- Mid-tower crossbar -->
      <line x1="-4" y1="3" x2="4" y2="3"
            style="stroke:#1685fc;stroke-width:1.0;stroke-linecap:round;" />
      <!-- Diagonal braces mid section -->
      <line x1="-4" y1="3" x2="0" y2="10"
            style="stroke:#1685fc;stroke-width:0.8;stroke-linecap:round;stroke-dasharray:none;" />
      <line x1="4" y1="3" x2="0" y2="10"
            style="stroke:#1685fc;stroke-width:0.8;stroke-linecap:round;" />

      <!-- Upper crossbar -->
      <line x1="-2.5" y1="-5" x2="2.5" y2="-5"
            style="stroke:#1685fc;stroke-width:1.0;stroke-linecap:round;" />
      <!-- Upper diagonal braces -->
      <line x1="-2.5" y1="-5" x2="-4" y2="3"
            style="stroke:#1685fc;stroke-width:0.8;stroke-linecap:round;" />
      <line x1="2.5" y1="-5" x2="4" y2="3"
            style="stroke:#1685fc;stroke-width:0.8;stroke-linecap:round;" />

      <!-- Antenna panel (left) -->
      <rect x="-5.5" y="-13" width="2" height="5" rx="0.4"
            style="fill:#d2b48c;stroke:#1685fc;stroke-width:0.9;" />
      <!-- Antenna panel (right) -->
      <rect x="3.5" y="-13" width="2" height="5" rx="0.4"
            style="fill:#d2b48c;stroke:#1685fc;stroke-width:0.9;" />
      <!-- Center antenna top indicator -->
      <circle cx="0" cy="-12" r="1.1"
              style="fill:#1685fc;stroke:none;" />

      <!-- Signal arcs (broadcast waves) left side -->
      <path d="M -6.5,-10 A 4,4 0 0,0 -6.5,-4"
            style="fill:none;stroke:#1685fc;stroke-width:0.9;stroke-linecap:round;" />
      <path d="M -9,-11.5 A 7,7 0 0,0 -9,-2.5"
            style="fill:none;stroke:#1685fc;stroke-width:0.8;stroke-linecap:round;" />

      <!-- Signal arcs (broadcast waves) right side -->
      <path d="M 6.5,-10 A 4,4 0 0,1 6.5,-4"
            style="fill:none;stroke:#1685fc;stroke-width:0.9;stroke-linecap:round;" />
      <path d="M 9,-11.5 A 7,7 0 0,1 9,-2.5"
            style="fill:none;stroke:#1685fc;stroke-width:0.8;stroke-linecap:round;" />

    </g>
  </g>
</svg>
